name: eng-soft1

services:
  postgres:
    image: postgres
    container_name: eng-soft1-postgres
    environment:
      POSTGRES_DB: eng-soft1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - eng-soft1_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  eng-soft1_postgres_data:

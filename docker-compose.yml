name: coi

services:
  postgres:
    image: postgres:17-alpine
    container_name: coi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coi}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - coi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-coi}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    image: coi-app
    container_name: coi-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      PORT: ${APP_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  coi_postgres_data:
